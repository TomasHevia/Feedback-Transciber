<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans antialiased">
  <nav class="bg-sky-700 h-14 flex items-center justify-between px-6 shadow-md">
    <a href="{{ url_for('main.index') }}" class="flex items-center gap-2.5">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="white" stroke-width="1.5"/><path d="M7 10.5l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-sm font-semibold text-white tracking-tight">Feedback Transcriber</span>
    </a>
    <div class="flex gap-6 items-center">
      {% if session.get('role') == 'supervisor' %}
        <a href="{{ url_for('main.index') }}" class="text-sm font-medium text-white hover:text-yellow-200 hover:underline underline-offset-4 transition-colors">Panel</a>
      {% endif %}
      {% if session.get('user_id') %}
        <a href="{{ url_for('main.nueva_queja') }}" class="text-sm font-medium text-white hover:text-yellow-200 hover:underline underline-offset-4 transition-colors">Nueva queja</a>
        <a href="{{ url_for('auth.logout') }}" class="text-sm font-medium text-rose-300 hover:text-rose-100 hover:underline underline-offset-4 transition-colors">Salir ({{ session.get('username') }})</a>
      {% endif %}
    </div>
  </nav>
  <main class="max-w-4xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
