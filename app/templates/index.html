{% extends "base.html" %}
{% block title %}Nueva queja — HotelVoz{% endblock %}

{% block content %}
<section class="record-page">
  <div class="record-card">
    <h1>Nueva queja</h1>

    <div class="form-group">
      <label for="session-label">Etiqueta de sesión</label>
      <input type="text" id="session-label" placeholder="Ej: Habitación 302 · turno noche" autocomplete="off">
    </div>

    <div id="recording-indicator" class="recording-indicator recording-idle">
      <span class="rec-dot"></span>
      <span id="rec-timer" class="rec-timer">00:00</span>
      <span class="rec-label" id="rec-label-text">En espera</span>
    </div>

    <div class="record-actions">
      <button id="btn-record" class="btn btn-primary btn-full">Iniciar grabación</button>
    </div>

    <p id="record-status" class="status-msg"></p>

    <div id="upload-section" hidden>
      <audio id="audio-preview" controls></audio>
      <button id="btn-submit" class="btn btn-primary btn-full">Procesar y guardar</button>
    </div>

    <div id="result-section" class="result-section" hidden>
      <div class="result-header">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="8" fill="#22c55e"/><path d="M5 8l2.5 2.5L11 5.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Procesado correctamente</span>
      </div>
      <dl id="result-fields" class="result-fields"></dl>
      <a id="result-link" href="#" class="btn-link">Ver queja completa →</a>
    </div>
  </div>
</section>
{% endblock %}
