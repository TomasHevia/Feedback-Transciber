{% extends "base.html" %}
{% block title %}Nueva queja{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-xl font-semibold tracking-tight mb-6">Nueva queja</h1>

  <div class="mb-4">
    <label for="session-label" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Etiqueta de sesión</label>
    <input type="text" id="session-label" placeholder="Ej: Habitación 302 · turno noche" autocomplete="off"
      class="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-900 placeholder-slate-400 outline-none focus:border-slate-400 transition-colors">
  </div>

  <div id="recording-indicator" class="recording-indicator recording-idle flex items-center gap-2.5 px-3.5 py-2.5 rounded-lg border mb-4 transition-all">
    <span class="rec-dot w-2 h-2 rounded-full flex-shrink-0"></span>
    <span id="rec-timer" class="tabular-nums text-sm tracking-wider font-medium">00:00</span>
    <span id="rec-label-text" class="text-xs ml-auto">En espera</span>
  </div>

  <div class="mb-3">
    <button id="btn-record" class="w-full py-2.5 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors">Iniciar grabación</button>
  </div>

  <p id="record-status" class="text-xs text-slate-400 min-h-[1.2em] mb-4"></p>

  <div id="upload-section" hidden class="mb-4">
    <div class="flex flex-col gap-3">
      <audio id="audio-preview" controls class="w-full"></audio>
      <button id="btn-submit" class="w-full py-2.5 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors disabled:opacity-40">Procesar y guardar</button>
    </div>
  </div>

  <div id="result-section" hidden class="border border-green-200 bg-green-50 rounded-lg p-4">
    <div class="flex flex-col gap-3">
      <div class="flex items-center gap-2 text-sm font-semibold text-green-700">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="8" fill="#22c55e"/><path d="M5 8l2.5 2.5L11 5.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Procesado correctamente
      </div>
      <dl id="result-fields" class="grid text-sm gap-y-1" style="grid-template-columns: auto 1fr; column-gap: 1rem;"></dl>
      {% if session.get('role') == 'supervisor' %}
        <a id="result-link" href="#" class="text-sm font-medium text-slate-900 border-b border-slate-300 pb-px w-fit hover:border-slate-900 transition-colors">Ver queja completa →</a>
      {% endif %}
    </div>
  </div>

  <div id="error-section" hidden class="border border-red-200 bg-red-50 rounded-lg p-4">
    <div class="flex flex-col gap-4">
      <div>
        <div class="flex items-center gap-2 text-sm font-semibold text-red-700 mb-1">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="8" fill="#ef4444"/><path d="M8 4.5v3.5M8 10.5v1" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
          Error al procesar el audio
        </div>
        <p id="error-message" class="text-xs text-red-600 leading-relaxed"></p>
      </div>

      <button id="btn-retry-upload"
        class="py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors disabled:opacity-40">
        Reintentar
      </button>

      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold uppercase tracking-wider text-slate-500">
          O ingresa la transcripción manualmente
        </label>
        <textarea id="manual-transcription" rows="4"
          placeholder="Escribe o pega la transcripción del audio…"
          class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-sky-400 transition-colors resize-none text-slate-700 placeholder-slate-400 bg-white"></textarea>
        <button id="btn-submit-manual" hidden
          class="py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors disabled:opacity-40">
          Analizar y guardar transcripción
        </button>
      </div>

      <button id="btn-cancel-upload"
        class="pt-1 text-sm text-red-400 hover:text-red-600 transition-colors text-left">
        Cancelar y descartar grabación
      </button>
    </div>
  </div>

</div>
{% endblock %}
