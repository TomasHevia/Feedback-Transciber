{% extends "base.html" %}
{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 border border-slate-200 rounded-lg p-6 bg-white shadow-sm">
  <h1 class="text-xl font-semibold tracking-tight mb-6 text-center">Iniciar Sesión</h1>
  
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="mb-4 p-3 bg-red-50 text-red-700 rounded text-sm">
        {{ messages[0] }}
      </div>
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.login') }}" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Usuario</label>
      <input type="text" name="username" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-slate-400">
    </div>
    
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
      <input type="password" name="password" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-slate-400">
    </div>
    
    <button type="submit" class="mt-2 w-full py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors">Ingresar</button>
  </form>
</div>
{% endblock %}
